<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIGE-CHAN OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-sm mx-auto bg-white p-6 rounded-3xl shadow-xl text-center">
        <h1 class="text-2xl font-black text-orange-600 mb-6">SHIGE-CHAN Platform</h1>
        
        <!-- 動作確認用ボタン -->
        <div class="space-y-4">
            <button onclick="testAction('注文')" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl">注文を確認する</button>
            <button onclick="testAction('登録')" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">スタッフ登録を確認する</button>
            <button onclick="window.location.reload()" class="w-full border py-2 text-xs font-bold text-gray-400">最新の状態に更新</button>
        </div>
        
        <p id="status" class="mt-6 text-xs font-bold text-green-600"></p>
    </div>

    <script>
        // ボタンが機能しているか即座に反応を返すテスト関数
        function testAction(type) {
            alert(type + "ボタンが正常に動作しています！接続は完璧です。");
            document.getElementById('status').innerText = "システム稼働中: " + type + "機能は正常です。";
        }
    </script>
</body>
</html>
