<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shige-chan Laundry KYC Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #007bff; color: white; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #auth-ui, #customer-ui, #kyc-ui { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-ui" style="display: block;">
            <h2>しげちゃんランドリー</h2>
            <input type="email" id="email" placeholder="メールアドレス">
            <input type="password" id="password" placeholder="パスワード">
            <button class="btn" onclick="handleAuth()">ログイン / 登録</button>
        </div>

        <div id="kyc-ui">
            <h3>本人確認が必要です</h3>
            <input type="file" id="id-photo" accept="image/*">
            <button class="btn" onclick="submitKYC()">申請する</button>
        </div>

        <div id="customer-ui">
            <h2>🧺 注文画面</h2>
            <p id="kyc-status"></p>
            <button class="btn" onclick="alert('注文受付！')">予約する</button>
        </div>
    </div>

    <script>
        // ★ここだけあなたの情報に変えてください
        const SUPABASE_URL = 'https://kvpbulqigitkhhnlttvj.supabase.co`;
        const SUPABASE_ANON_KEY = 'sb_publishable_kErlW2nyXnGFeJopcV124A_GDnWoYzV';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                await supabaseClient.auth.signUp({ email, password });
                alert("確認メールを送りました");
            } else {
                showUI(data.user);
            }
        }

        async function showUI(user) {
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            document.getElementById('auth-ui').style.display = 'none';
            if (profile.kyc_status === 'none') {
                document.getElementById('kyc-ui').style.display = 'block';
            } else {
                document.getElementById('customer-ui').style.display = 'block';
                document.getElementById('kyc-status').innerText = profile.kyc_status === 'pending' ? '⏳ 承認待ち' : '✅ 確認済み';
            }
        }

        async function submitKYC() {
            const file = document.getElementById('id-photo').files[0];
            if (!file) return alert("画像を選んでください");
            const { data: { user } } = await supabaseClient.auth.getUser();
            const fileName = `id-${user.id}-${Date.now()}`;
            await supabaseClient.storage.from('id-docs').upload(fileName, file);
            await supabaseClient.from('profiles').update({ kyc_status: 'pending' }).eq('id', user.id);
            alert("申請しました！");
            location.reload();
        }
    </script>
</body>
</html>
