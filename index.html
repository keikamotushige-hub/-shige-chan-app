<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIGE-CHAN Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- ナビ -->
    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black text-orange-600">SHIGE-CHAN</h1>
        <button onclick="showPage('admin')" class="bg-slate-100 p-2 rounded-lg text-slate-500">管理者</button>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <!-- 【注文ページ】 -->
        <div id="page-user" class="page block space-y-6">
            <div class="bg-orange-500 rounded-3xl p-6 text-white shadow-lg">
                <h2 class="text-2xl font-bold italic mb-2">おたすけ代行</h2>
                <p class="text-xs opacity-80">洗濯・予約代行をすべてお任せ</p>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-md border space-y-4">
                <input type="text" id="cust-name" placeholder="お名前" class="w-full p-4 bg-slate-100 rounded-2xl border-0">
                <div class="flex gap-2">
                    <input type="text" id="hotel-name" placeholder="ホテル名・住所" class="flex-1 p-4 bg-slate-100 rounded-2xl border-0">
                    <button onclick="openMap()" class="bg-white border p-4 rounded-2xl text-orange-500"><i class="fa-solid fa-map-location-dot"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="svc" onchange="updateTotal()" class="p-3 bg-slate-100 rounded-xl font-bold text-sm">
                        <option value="3500">洗濯代行 (¥3,500)</option>
                        <option value="1500">予約代行 (¥1,500)</option>
                    </select>
                    <select id="speed" onchange="updateTotal()" class="p-3 bg-slate-100 rounded-xl font-bold text-sm">
                        <option value="0">通常配送</option>
                        <option value="2000">3時間特急 (+¥2,000)</option>
                    </select>
                </div>

                <select id="pay" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-sm">
                    <option value="cash">現金 (代金引換)</option>
                    <option value="credit">クレジットカード</option>
                </select>

                <div class="flex items-start gap-2 p-3 bg-orange-50 rounded-xl text-[10px]">
                    <input type="checkbox" id="terms" class="mt-1">
                    <label for="terms">規約・洗えないもの・反社でないことに同意する</label>
                </div>

                <div class="bg-slate-900 text-white p-4 rounded-2xl flex justify-between">
                    <span>合計金額</span><span id="total" class="text-xl font-black text-orange-400">¥3,500</span>
                </div>

                <button onclick="order()" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg active:opacity-50">注文を確定する</button>
            </div>
            <button onclick="showPage('crew')" class="w-full text-slate-400 text-xs underline">代行スタッフ登録はこちら</button>
        </div>

        <!-- 【クルー登録】 -->
        <div id="page-crew" class="page hidden space-y-4">
            <h2 class="text-xl font-bold">パートナー登録</h2>
            <div class="bg-white p-6 rounded-3xl shadow-md space-y-4 border">
                <p class="text-xs font-bold text-slate-400 uppercase">身分証アップロード</p>
                <div class="grid grid-cols-2 gap-4">
                    <input type="file" id="f1" class="hidden" onchange="preview(this, 'p1')">
                    <label for="f1" id="p1" class="aspect-square bg-slate-100 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-slate-300">
                        <i class="fa-solid fa-camera"></i><span class="text-[10px]">表面</span>
                    </label>
                    <input type="file" id="f2" class="hidden" onchange="preview(this, 'p2')">
                    <label for="f2" id="p2" class="aspect-square bg-slate-100 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-slate-300">
                        <i class="fa-solid fa-camera"></i><span class="text-[10px]">裏面</span>
                    </label>
                </div>
                <button onclick="regCrew()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl">登録を申請する</button>
                <button onclick="showPage('user')" class="w-full text-slate-400">戻る</button>
            </div>
        </div>

        <!-- 【管理者ダッシュボード】 -->
        <div id="page-admin" class="page hidden space-y-4">
            <div class="bg-slate-900 text-white p-6 rounded-3xl">
                <p class="text-xs opacity-50">総売上 (手数料20%込)</p>
                <p id="sales" class="text-3xl font-black text-green-400">¥0</p>
            </div>
            <div id="history" class="space-y-2">
                <p class="text-xs font-bold text-slate-400">最近の注文</p>
                <!-- ここに注文が追加される -->
            </div>
            <button onclick="showPage('user')" class="w-full text-slate-400">閉じる</button>
        </div>

    </main>

    <script>
        // ボタンを動かすための全機能
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.replace('block', 'hidden'));
            document.getElementById('page-' + id).classList.replace('hidden', 'block');
            window.scrollTo(0,0);
        }

        function updateTotal() {
            const s = parseInt(document.getElementById('svc').value);
            const sp = parseInt(document.getElementById('speed').value);
            document.getElementById('total').innerText = "¥" + (s + sp).toLocaleString();
        }

        function openMap() {
            const h = document.getElementById('hotel-name').value;
            if(!h) return alert("住所を入力してください");
            window.open("https://www.google.com/maps/search/?api=1&query=" + h);
        }

        let sales = 0;
        function order() {
            const n = document.getElementById('cust-name').value;
            const h = document.getElementById('hotel-name').value;
            if(!n || !h || !document.getElementById('terms').checked) return alert("入力と規約同意が必要です");
            
            const t = parseInt(document.getElementById('total').innerText.replace(/[¥,]/g, ''));
            sales += t;
            document.getElementById('sales').innerText = "¥" + sales.toLocaleString();
            
            // 履歴追加
            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-xl border-l-4 border-orange-500 shadow-sm text-sm";
            div.innerHTML = `<b>${n}様</b> - ¥${t.toLocaleString()}<br><small>${h}</small>`;
            document.getElementById('history').prepend(div);
            
            alert("注文完了！代行スタッフが向かいます。");
        }

        function preview(input, id) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const el = document.getElementById(id);
                    el.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-2xl">`;
                    el.classList.replace('border-slate-300', 'border-green-500');
                }
                r.readAsDataURL(input.files[0]);
            }
        }

        function regCrew() {
            alert("申請を受け付けました。審査を開始します。");
            showPage('user');
        }
    </script>
</body>
</html>
