<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIGE-CHAN | Premium Proxy Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.7.6/i18next.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <!-- 1. ログイン/登録ポータル -->
    <section id="auth-section" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[2rem] shadow-2xl">
            <h1 class="text-3xl font-extrabold text-center mb-8">Welcome to<br><span class="text-orange-500">SHIGE-CHAN</span></h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl border-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl border-none">
                <button onclick="auth('login')" class="w-full py-4 bg-black text-white rounded-2xl font-bold">Login</button>
                <button onclick="auth('register')" class="w-full py-4 text-slate-500 text-sm font-bold underline">Create Account</button>
            </div>
        </div>
    </section>

    <!-- 2. メインアプリ（ログイン後） -->
    <div id="app-section" class="hidden">
        <!-- Google Map 連携用コンテナ -->
        <div id="map-area" class="h-64 w-full bg-slate-200 flex items-center justify-center text-slate-400">
            [Google Maps Integration: Pinning Precise Location]
        </div>

        <main class="p-6 space-y-8">
            <!-- 多言語チャットウィジェット -->
            <section class="glass p-6 rounded-[2rem] border shadow-sm">
                <h2 class="font-bold mb-4">Customer Support (Multilingual)</h2>
                <div id="chat-box" class="h-40 overflow-y-auto bg-slate-50 rounded-2xl p-4 mb-4 text-xs"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 p-3 rounded-xl bg-slate-100" placeholder="Message...">
                    <button onclick="sendMessage()" class="px-6 bg-orange-500 text-white rounded-xl font-bold">Send</button>
                </div>
            </section>

            <!-- ホテル選択：ワンタッチでGoogleマップ連動 -->
            <section>
                <h2 class="font-bold mb-4 text-sm">Select Destination</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectLoc('Imperial Hotel', '35.672,139.758')" class="p-4 bg-white border rounded-2xl text-xs font-bold hover:border-orange-500">帝国ホテル</button>
                    <button onclick="selectLoc('Kawagoe CC', '35.952,139.389')" class="p-4 bg-white border rounded-2xl text-xs font-bold hover:border-orange-500">川越CC</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 管理者用認証とログイン管理
        function auth(mode) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            // 管理者特別判定: 登録もログインもこれで完結
            if(email === "shigeme117@yahoo.co.jp" && pass === "117") {
                alert("Welcome, Admin");
                showApp('admin');
            } else {
                alert("Account created/logged in.");
                showApp('user');
            }
        }

        function showApp(role) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').classList.remove('hidden');
            console.log("Logged in as:", role);
        }

        // マップピン止めシミュレーション
        function selectLoc(name, coord) {
            alert(name + " にピンを固定しました: " + coord);
            // ここに Google Maps API を呼び出す処理が入ります
        }

        // 多言語チャット
        function sendMessage() {
            const msg = document.getElementById('chat-input').value;
            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="mb-2"><b>You:</b> ${msg}</div>`;
            document.getElementById('chat-input').value = '';
        }
    </script>
</body>
</html>
