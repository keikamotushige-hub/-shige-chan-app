<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shige-chan Laundry - Profit Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .price-box { background: #333; color: #fff; padding: 20px; border-radius: 12px; text-align: center; }
        .price-main { font-size: 36px; font-weight: bold; color: #00ffcc; }
        .method-choice { display: flex; gap: 10px; margin-top: 10px; }
        .method-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: center; }
        .active { border-color: var(--primary); background: #e7f3ff; color: var(--primary); font-weight: bold; }
        .btn-order { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; height: 65px; width: 100%; border-radius: 10px; font-size: 18px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center;">🧺 しげちゃん代行</h1>

    <div class="card">
        <label>⚡ サービスプランを選択</label>
        <select id="plan" onchange="updatePrice()">
            <option value="6000">通常代行 (24h) - ¥6,000</option>
            <option value="8000">お急ぎ代行 (3h) - ¥8,000</option>
        </select>

        <label style="margin-top:15px; display:block;">💳 支払い方法</label>
        <div class="method-choice">
            <div id="btn-card" class="method-btn active" onclick="setMethod('card')">クレジットカード</div>
            <div id="btn-cash" class="method-btn" onclick="setMethod('cash')">現金払い</div>
        </div>

        <div class="price-box">
            <span style="font-size:12px;">合計金額 (消費税込)</span><br>
            <span class="price-main" id="display-price">¥6,000</span>
        </div>
    </div>

    <div class="card">
        <label>🏨 ホテル名・お部屋番号</label>
        <input type="text" id="loc" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;" placeholder="Example Hotel Room 101">
    </div>

    <button class="btn-order" onclick="processPayment()">注文を確定して決済へ</button>

    <div style="font-size:11px; color:#999; margin-top:10px; line-height:1.4;">
        ※スタッフのコインランドリー実費等を含む適正な代行手数料に設定されています。
    </div>
</div>

<script>
    let paymentMethod = 'card';

    function setMethod(m) {
        paymentMethod = m;
        document.getElementById('btn-card').className = 'method-btn' + (m === 'card' ? ' active' : '');
        document.getElementById('btn-cash').className = 'method-btn' + (m === 'cash' ? ' active' : '');
    }

    function updatePrice() {
        const price = document.getElementById('plan').value;
        document.getElementById('display-price').innerText = "¥" + parseInt(price).toLocaleString();
    }

    async function processPayment() {
        const total = document.getElementById('plan').value;
        const loc = document.getElementById('loc').value;
        
        if(!loc) { alert("お届け先を入力してください"); return; }

        if(paymentMethod === 'card') {
            // ここで Stripe のチェックアウト画面へ飛ばす処理を動かします
            alert(total + "円のカード決済画面へ移動します（Stripe連携中...）");
        } else {
            alert("現金払いでの注文を承りました。現地にてスタッフへお支払いください。");
        }
    }
</script>

</body>
</html>
