<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shige-chan Laundry - Global Laundry Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; line-height: 1.5; }
        .app-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin-bottom: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .warning-card { border: 2px solid var(--danger); background: #fff5f5; }
        .price-tag { font-size: 24px; font-weight: bold; text-align: center; color: var(--primary); margin: 10px 0; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        #map { width: 100%; height: 200px; background: #e9ecef; border-radius: 10px; margin-top: 10px; }
        .agree-text { font-size: 13px; margin-left: 8px; vertical-align: middle; }
        .btn-main { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; height: 60px; font-size: 20px; }
        .btn-main:disabled { background: #ccc; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🧺 Shige-chan Laundry</h1>

    <div class="card">
        <label>🌐 Language / 言語</label>
        <select id="lang-select">
            <option value="ja">日本語 (Japanese)</option>
            <option value="en">English (Automatic Translation)</option>
            <option value="zh">简体中文 (Chinese)</option>
            <option value="ko">한국어 (Korean)</option>
            <option value="vi">Tiếng Việt (Vietnamese)</option>
        </select>
    </div>

    <div class="card">
        <label>🏨 Pickup Location (Hotel Name)</label>
        <input type="text" id="pac-input" placeholder="Search your hotel...">
        <div id="map">Map Loading...</div>
    </div>

    <div class="card">
        <label>⚡ Select Service</label>
        <select id="plan-select" onchange="updateUI()">
            <option value="4500">Standard Plan (24h) - ¥4,500</option>
            <option value="6500">Express Plan (3h) - ¥6,500</option>
            <option value="3000">Restaurant/Golf Booking Proxy - ¥3,000</option>
        </select>
        <div class="price-tag" id="display-price">¥4,500</div>
    </div>

    <div class="card warning-card">
        <label style="color:var(--danger)">⚠️ Prohibited Items (Cannot Wash)</label>
        <p style="font-size:12px; margin:5px 0;">Suits, Coats, Leather, Silk, Cashmere, High-value items (>¥100k), Pet items, Oil-stained rags.</p>
        <hr>
        <div style="font-size:14px;">
            <input type="checkbox" id="check-shrink" class="user-check"> <span class="agree-text">Agree to risk of shrinking/fading</span><br>
            <input type="checkbox" id="check-prohibited" class="user-check"> <span class="agree-text">No prohibited items included</span><br>
            <input type="checkbox" id="check-privacy" class="user-check"> <span class="agree-text">Agree to Terms & ID Check</span>
        </div>
    </div>

    <button class="btn-main" id="order-btn" onclick="processOrder()">Confirm & Pay</button>
</div>

<script>
    // --- 【重要】ここをお手持ちの情報に書き換えてください ---
    const SUPABASE_URL = 'https://kvpbulqigitkhhnlttvj.supabase.co';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    // --------------------------------------------------

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateUI() {
        const price = document.getElementById('plan-select').value;
        document.getElementById('display-price').innerText = "¥" + Number(price).toLocaleString();
    }

    async function processOrder() {
        const checks = document.querySelectorAll('.user-check');
        let allOk = true;
        checks.forEach(c => { if(!c.checked) allOk = false; });

        if (!allOk) {
            alert("Please agree to all terms.\nすべての項目に同意が必要です。");
            return;
        }

        const hotel = document.getElementById('pac-input').value;
        const price = document.getElementById('plan-select').value;
        const planName = document.getElementById('plan-select').options[document.getElementById('plan-select').selectedIndex].text;

        if (!hotel) {
            alert("Please enter location.\n場所を入力してください。");
            return;
        }

        // Supabaseへ保存
        const { data, error } = await _supabase.from('orders').insert([
            { hotel_name: hotel, total_price: price, service_type: planName, status: 'pending' }
        ]);

        if (error) {
            alert("System Error: " + error.message);
        } else {
            alert("Success! Shige-chan will handle it.\n予約が完了しました！");
        }
    }

    // Google Maps 初期化
    function initMap() {
        const defaultLoc = { lat: 35.6895, lng: 139.6917 };
        const map = new google.maps.Map(document.getElementById("map"), {
            center: defaultLoc, zoom: 15, disableDefaultUI: true
        });
        const input = document.getElementById("pac-input");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("projection", map);
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuLv1nI7BzGNnI1jkjPNW0MGS5l2HRccs&libraries=places&callback=initMap" async defer></script>

</body>
</html>
