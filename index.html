<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIGE-CHAN Driver Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 pb-20">

    <!-- ナビゲーション -->
    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black text-orange-600">SHIGE-CHAN</h1>
        <div id="status-badge" class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded-full">モード切替待ち</div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- 管理者ダッシュボード -->
        <section id="admin-view" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl text-white">
                <h2 class="text-sm font-bold opacity-50">管理者ダッシュボード (shigeme117@yahoo.co.jp)</h2>
                <p class="text-3xl font-black mt-2">案件・申請管理</p>
            </div>
            <div id="admin-list" class="space-y-3">
                <!-- 注文や申請がリアルタイムでリストアップ -->
            </div>
        </section>

        <!-- ドライバー（代行者）向け：案件一覧 -->
        <section id="driver-view" class="space-y-4">
            <h2 class="font-black text-slate-800">付近の案件（Uber方式）</h2>
            <div id="job-board" class="space-y-3">
                <!-- 注文が入るとここに案件が出現 -->
                <p class="text-xs text-slate-400">現在、新しい案件はありません</p>
            </div>
        </section>

        <!-- お客様用：注文フォーム -->
        <section id="user-view" class="bg-white p-6 rounded-3xl shadow-sm">
            <h2 class="font-black mb-4">新規注文</h2>
            <input type="text" id="u-name" placeholder="お名前" class="w-full p-3 bg-slate-50 rounded-xl mb-2">
            <button onclick="postJob()" class="w-full bg-orange-500 text-white font-black py-4 rounded-xl">注文を出す</button>
        </section>
    </main>

    <script>
        let db = { jobs: [], requests: [] };

        // 注文を発行する (客)
        function postJob() {
            const name = document.getElementById('u-name').value;
            if(!name) return;
            const job = { id: Date.now(), name, status: '募集中' };
            db.jobs.push(job);
            
            // 管理者とドライバー双方へ通知シミュレーション
            alert("管理者および全ドライバーに案件を通知しました！");
            updateViews();
        }

        // 案件を受ける (ドライバー)
        function acceptJob(id) {
            const job = db.jobs.find(j => j.id === id);
            job.status = '対応中';
            alert("案件を受注しました！作業を開始してください。");
            updateViews();
        }

        // 画面更新 (全画面)
        function updateViews() {
            // ドライバー向け案件リスト
            const board = document.getElementById('job-board');
            board.innerHTML = db.jobs.map(j => `
                <div class="bg-white p-4 rounded-2xl shadow border-l-4 ${j.status === '募集中' ? 'border-green-500' : 'border-slate-300'}">
                    <p class="font-black">${j.name} 様からの依頼</p>
                    <p class="text-xs text-slate-500">ステータス: ${j.status}</p>
                    ${j.status === '募集中' ? `<button onclick="acceptJob(${j.id})" class="mt-2 w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-bold">この案件を受ける</button>` : ''}
                </div>
            `).join('');

            // 管理者リスト
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = db.jobs.map(j => `
                <div class="bg-white p-4 rounded-xl shadow">
                    <p class="text-sm font-bold">依頼者: ${j.name} / 状況: ${j.status}</p>
                </div>
            `).join('');
        }

        // 初期起動
        function init() {
            const mode = prompt("ログインモード選択: [admin / driver / user]");
            if(mode === 'admin') document.getElementById('admin-view').classList.remove('hidden');
            if(mode === 'driver') document.getElementById('driver-view').classList.remove('hidden');
            if(mode === 'user') document.getElementById('user-view').classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
