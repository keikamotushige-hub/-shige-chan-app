<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shige-chan Proxy Service</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; line-height: 1.6; }
        header { text-align: center; margin-bottom: 30px; }
        .card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        select, textarea { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .terms { font-size: 14px; color: #666; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status-msg { margin-top: 20px; color: green; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

<header>
    <h1 style="color: #0070f3; margin-bottom: 5px;">Shige-chan App</h1>
    <p style="margin-top: 0;">洗濯代行・予約代行・並び代行</p>
</header>

<div class="card">
    <strong>1. サービスを選択</strong>
    <select id="service-type">
        <option value="洗濯代行">👕 洗濯代行 (コインランドリー運搬)</option>
        <option value="予約代行">📞 予約手続き代行 (事務サポート)</option>
        <option value="並び代行">🚶 行列並び代行 (現場作業)</option>
    </select>
</div>

<div class="card">
    <strong>2. 依頼内容の詳細</strong>
    <textarea id="order-notes" placeholder="場所、時間、細かい指示を入力してください"></textarea>
</div>

<div class="terms">
    <label>
        <input type="checkbox" id="terms-checkbox" onchange="toggleButton()">
        <strong>利用規約に同意する</strong>
    </label>
    <ul style="margin-top: 5px; padding-left: 20px;">
        <li>本サービスは作業代行であり、結果を保証するものではありません。</li>
        <li>衣類の損傷や予約不可時の責任は負いかねます。</li>
        <li>法令を遵守し、迷惑行為となる並びは行いません。</li>
    </ul>
</div>

<button id="order-button" onclick="submitOrder()" disabled>依頼を確定する</button>

<div id="status-msg">🔄 依頼を受け付けました。作業を開始します。</div>

<script>
    function toggleButton() {
        const checkbox = document.getElementById('terms-checkbox');
        const button = document.getElementById('order-button');
        button.disabled = !checkbox.checked;
    }

    function submitOrder() {
        const service = document.getElementById('service-type').value;
        const msg = document.getElementById('status-msg');
        alert(service + 'の依頼を確定しました。トラブル防止のため、現場写真を記録します。');
        msg.style.display = 'block';
    }
</script>

</body>
</html>
