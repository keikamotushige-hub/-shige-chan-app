<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shige-chan Laundry KYC Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main { background: #007bff; color: white; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #auth-ui, #customer-ui, #admin-ui, #kyc-ui { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-ui">
            <h2>しげちゃんランドリー</h2>
            <p>本人確認システム</p>
            <input type="email" id="email" placeholder="メールアドレス">
            <input type="password" id="password" placeholder="パスワード">
            <button class="btn btn-main" onclick="handleAuth()">ログイン / 新規登録</button>
        </div>

        <div id="kyc-ui">
            <h3>本人確認（いたずら防止）</h3>
            <p>安全な運営のため、身分証をアップロードしてください。</p>
            <input type="file" id="id-photo" accept="image/*">
            <button class="btn btn-main" onclick="submitKYC()">申請する</button>
        </div>

        <div id="customer-ui">
            <h2>🧺 注文メニュー</h2>
            <div id="kyc-msg" style="color:red; font-weight:bold;"></div>
            <div class="card">
                <p>コースを選択</p>
                <select id="course">
                    <option value="normal">通常（翌日） - ¥3,500</option>
                    <option value="express">3時間特急 - ¥7,500</option>
                </select>
                <button class="btn btn-main" onclick="alert('注文を受け付けました！')">予約する</button>
            </div>
        </div>

        <div id="admin-ui">
            <h2>📊 管理画面</h2>
            <button class="btn btn-main" onclick="loadPendingKYC()">確認待ちリストを読み込む</button>
            <div id="kyc-list"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kvpbuigigstkhhsitrvj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cGJ1aWdpZ3N0a2hoc2l0cnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTE4Njk5MzksImV4cCI6MjAyNzQ0NTkzOX0.6F_jGdwXzV...'; // ここは自分のキーに直してください
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                await supabaseClient.auth.signUp({ email, password });
                alert("確認メールを送りました。承認してください。");
            } else {
                getUserProfile(data.user);
            }
        }

        async function getUserProfile(user) {
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            document.getElementById('auth-ui').style.display = 'none';
            if (profile.role === 'admin') {
                document.getElementById('admin-ui').style.display = 'block';
            } else if (profile.kyc_status === 'none') {
                document.getElementById('kyc-ui').style.display = 'block';
            } else {
                document.getElementById('customer-ui').style.display = 'block';
                document.getElementById('kyc-msg').innerText = profile.kyc_status === 'pending' ? '⏳ 承認待ちです' : '✅ 本人確認済み';
            }
        }

        async function submitKYC() {
            const fileInput = document.getElementById('id-photo');
            const file = fileInput.files[0];
            if (!file) return alert("写真を選択してください");
            const { data: { user } } = await supabaseClient.auth.getUser();
            const fileName = `id-${user.id}-${Date.now()}`;
            await supabaseClient.storage.from('id-docs').upload(fileName, file);
            await supabaseClient.from('profiles').update({ kyc_status: 'pending' }).eq('id', user.id);
            alert("申請しました！");
            location.reload();
        }
    </script>
</body>
</html>
