<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しげちゃんランドリー - 統合業務システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #007bff; --admin: #dc3545; --staff: #28a745; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 600px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-auth { background: #555; color: white; padding: 5px 10px; font-size: 12px; border: none; border-radius: 5px; }
        #map { width: 100%; height: 250px; border-radius: 10px; margin-top: 10px; border: 1px solid #ccc; }
        .chat-box { height: 150px; overflow-y: auto; border: 1px solid #eee; background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-header">
        <span id="mode-text">🧺 お客さま注文画面</span>
        <button id="login-toggle-btn" class="btn-auth" onclick="toggleLoginView()">関係者ログイン</button>
    </div>

    <div id="view-user" class="view-section active">
        <h3>🚀 洗濯代行のご依頼</h3>
        <div class="card">
            <label>👤 お名前</label>
            <input type="text" id="user-name" placeholder="例：鈴木 しげお">
            <label>📞 電話番号</label>
            <input type="tel" id="user-phone" placeholder="例：09012345678">
            <label>🏨 集荷場所 (ホテル名など)</label>
            <input type="text" id="pac-input" placeholder="ホテル名を入力してください">
            <div id="map">地図読み込み中...</div>
        </div>
        <div class="card">
            <label>💬 配達員とチャット</label>
            <div class="chat-box" id="chat-u"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msg-u" placeholder="メッセージ入力">
                <button onclick="sendChat('u')" style="width:70px; background:#eee; border:1px solid #ccc; border-radius:8px;">送信</button>
            </div>
        </div>
        <button class="btn btn-main" onclick="submitOrder()">規約に同意して依頼する</button>
    </div>

    <div id="view-login" class="view-section">
        <div style="padding:40px; text-align:center;">
            <h3>🔐 関係者サインイン</h3>
            <input type="text" id="auth-id" placeholder="ユーザーID">
            <input type="password" id="auth-pw" placeholder="パスワード">
            <button class="btn btn-main" onclick="doLogin()">ログイン</button>
            <button class="btn" style="background:#eee;" onclick="cancelLogin()">キャンセル</button>
        </div>
    </div>

    <div id="view-staff" class="view-section">
        <h3 style="color:var(--staff);">🛵 配達員パネル</h3>
        <div class="card" id="orders">現在、新しい依頼はありません。</div>
        <div class="card">
            <label>💬 お客さまとチャット</label>
            <div class="chat-box" id="chat-s"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msg-s" placeholder="お客さまへ返信">
                <button onclick="sendChat('s')" style="width:70px; background:var(--staff); color:white; border-radius:8px; border:none;">送信</button>
            </div>
        </div>
        <button class="btn" style="background:#eee;" onclick="doLogout()">ログアウト</button>
    </div>

    <div id="view-admin" class="view-section">
        <h3 style="color:var(--admin);">👑 管理者総括パネル</h3>
        <div class="card">
            <p>本日の売上: ¥0</p>
            <p>全注文履歴・スタッフ名簿の管理が可能です。</p>
        </div>
        <button class="btn" style="background:#eee;" onclick="doLogout()">ログアウト</button>
    </div>
</div>

<script>
    // --- 🔑 【重要】ここにしげちゃんさんの情報を入れてください ---
    const SUPABASE_URL = 'https://kvpbulqigitkhhnlttvj.supabase.co'; 
    const SUPABASE_ANON_KEY ='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cGJ1bHFpZ2l0a2hobmx0dHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjgyNjUsImV4cCI6MjA5Mzg0NDI2NX0.yXKCqhm2awIgavyWyD6pdiKE4vJoiLlfnMyn7UZiKeA';
    // --------------------------------------------------------
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function toggleLoginView() { switchView('view-login'); }
    function cancelLogin() { switchView('view-user'); }

    async function doLogin() {
        const id = document.getElementById('auth-id').value;
        const pw = document.getElementById('auth-pw').value;
        const { data, error } = await supabase.from('users').select('*').eq('user_id', id).eq('password', pw).single();

        if (error || !data) { alert("IDまたはパスワードが正しくありません。"); return; }
        
        if (data.role === 'admin') {
            switchView('view-admin');
            document.getElementById('mode-text').innerText = "👑 管理者モード";
        } else {
            switchView('view-staff');
            document.getElementById('mode-text').innerText = "🛵 配達員モード";
        }
        document.getElementById('login-toggle-btn').style.display = 'none';
    }

    function doLogout() {
        switchView('view-user');
        document.getElementById('mode-text').innerText = "🧺 お客さま注文画面";
        document.getElementById('login-toggle-btn').style.display = 'block';
    }

    function switchView(id) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function sendChat(role) {
        const input = document.getElementById('msg-' + role);
        const boxes = [document.getElementById('chat-u'), document.getElementById('chat-s')];
        if(!input.value) return;
        const html = `<div><b>${role==='u'?'客':'スタッフ'}:</b> ${input.value}</div>`;
        boxes.forEach(b => { b.innerHTML += html; b.scrollTop = b.scrollHeight; });
        input.value = "";
    }

    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), { center: { lat: 35.891, lng: 139.791 }, zoom: 15 });
        const auto = new google.maps.places.Autocomplete(document.getElementById("pac-input"));
        auto.bindTo("bounds", map);
        const marker = new google.maps.Marker({ map: map });
        auto.addListener("place_changed", () => {
            const p = auto.getPlace();
            if (p.geometry) { map.setCenter(p.geometry.location); marker.setPosition(p.geometry.location); }
        });
    }

    function submitOrder() {
        const n = document.getElementById('user-name').value;
        if(!n) { alert("お名前を入力してください"); return; }
        alert(n + "様、ご依頼を承りました！");
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuLv1nI7BzGNnI1jkjPNW0MGS5l2HRccs&libraries=places&callback=initMap" async defer></script>
</body>
</html>
