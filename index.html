<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しげちゃん代行 - Shige-chan Laundry Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f8f9fa; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.4; }
        .app-container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .price-display { background: #333; color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin: 10px 0; }
        .price-val { font-size: 36px; font-weight: bold; color: #00ffcc; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; color: #555; }
        select, input, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-main { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; height: 65px; font-size: 20px; }
        .hint { font-size: 11px; color: #666; margin-bottom: 8px; }
        #map { width: 100%; height: 250px; border-radius: 10px; margin-top: 5px; border: 1px solid #ddd; }
        .method-choice { display: flex; gap: 10px; margin-bottom: 15px; }
        .method-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; background: #fff; font-size: 14px; }
        .method-btn.active { border-color: var(--primary); background: #e7f3ff; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; color:var(--primary); margin: 10px 0;">🧺 しげちゃん代行</h1>
    
    <div class="card" style="background:#fffbe6; font-size:11px;">
        【法的事項】本サービスは「家事代行」です。料金には洗濯作業・手間賃が含まれます。積載制限（30kg）を遵守し安全に配送します。
    </div>

    <div class="card">
        <label>⚡ サービスプラン</label>
        <select id="plan-select" onchange="calcPrice()">
            <option value="6000">通常代行 (24h) - ¥6,000</option>
            <option value="8000">お急ぎ代行 (3h) - ¥8,000</option>
        </select>

        <label>⚖️ お洗濯物の量</label>
        <select id="weight-select" onchange="calcPrice()">
            <option value="0">〜5kg (標準) - +¥0</option>
            <option value="1500">5〜15kg (重い) - +¥1,500</option>
            <option value="3000">15〜30kg (積載上限) - +¥3,000</option>
        </select>

        <label>💳 お支払い方法</label>
        <div class="method-choice">
            <div id="m-card" class="method-btn active" onclick="setMethod('card')">カード決済</div>
            <div id="m-cash" class="method-btn" onclick="setMethod('cash')">現金払い</div>
        </div>

        <div class="price-display">
            <span style="font-size:12px;">合計代行手数料 (税込)</span><br>
            <span class="price-val" id="total-price">¥6,000</span>
        </div>
    </div>

    <div class="card">
        <label>🏨 集荷場所 (Hotel / Address)</label>
        <input type="text" id="pac-input" placeholder="ホテル名や住所を入力">
        <div id="map">地図を読み込み中...</div>
    </div>

    <div class="card">
        <label>🆔 本人確認書類</label>
        <input type="file" id="user-id" accept="image/*">
    </div>

    <button class="btn-main" onclick="submitOrder()">規約に同意して依頼する</button>
</div>

<script>
    // --- 設定済み：しげちゃんさんの専用キー ---
    const SUPABASE_URL = 'https://kvpbulqigitkhhnlttvj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cGJ1bHFpZ2l0a2hobmx0dHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjgyNjUsImV4cCI6MjA5Mzg0NDI2NX0.yXKCqhm2awIgavyWyD6pdiKE4vJoiLlfnMyn7UZiKeA';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let payMethod = 'card';
    let map, marker;

    function setMethod(m) {
        payMethod = m;
        document.getElementById('m-card').className = 'method-btn' + (m === 'card' ? ' active' : '');
        document.getElementById('m-cash').className = 'method-btn' + (m === 'cash' ? ' active' : '');
    }

    function calcPrice() {
        const p = parseInt(document.getElementById('plan-select').value);
        const w = parseInt(document.getElementById('weight-select').value);
        document.getElementById('total-price').innerText = "¥" + (p + w).toLocaleString();
    }

    function initMap() {
        const defaultLoc = { lat: 35.6895, lng: 139.6917 };
        map = new google.maps.Map(document.getElementById("map"), {
            center: defaultLoc, zoom: 15
        });
        marker = new google.maps.Marker({ map: map, draggable: true });
        const input = document.getElementById("pac-input");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (place.geometry) {
                map.setCenter(place.geometry.location);
                marker.setPosition(place.geometry.location);
            }
        });
    }

    async function submitOrder() {
        const loc = document.getElementById('pac-input').value;
        if(!loc) { alert("場所を入力してください"); return; }
        alert("依頼を受け付けました！Vercelで動作確認完了です！");
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuLv1nI7BzGNnI1jkjPNW0MGS5l2HRccs&libraries=places&callback=initMap" async defer></script>
</body>
</html>
